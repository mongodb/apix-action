---
name: Test secrets
on:
  workflow_dispatch:

permissions: {}

jobs:
  test-github-app:
    name: Test GitHub App token
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: 1password/load-secrets-action@v4
        id: load-secrets
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: "op://APIx/APIx Github Bot/App ID"
          APP_SECRET: "op://APIx/APIx Github Bot/App Secret"
      - id: decode-app-secret
        run: |
          {
            echo 'APP_PEM<<EOF'
            echo "${{ steps.load-secrets.outputs.APP_SECRET }}" | base64 -d | openssl pkey -inform DER -outform PEM
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - name: Generate App token
        id: app-token
        uses: mongodb/apix-action/token@8549161120ce38b1e132ff833302a0ecbde58038
        with:
          app-id: ${{ steps.load-secrets.outputs.APP_ID }}
          private-key: ${{ steps.decode-app-secret.outputs.APP_PEM }}
      - name: List repos the app can access
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "Bot identity: ${{ steps.app-token.outputs.user-name }}"
          gh api /installation/repositories --jq '.repositories[] | .full_name' | sort

  test-jira-token:
    name: Test Jira token
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: 1password/load-secrets-action@v4
        id: load-secrets
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          JIRA_API_TOKEN: "op://APIx/JIRA service account/credential"
      - name: Check Jira identity
        run: |
          curl -sf \
            -H "Authorization: Bearer ${{ steps.load-secrets.outputs.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://jira.mongodb.org/rest/api/2/myself" \
            | jq '{displayName, emailAddress, active}'
      - name: Check CLOUDP project access
        run: |
          curl -sf \
            -H "Authorization: Bearer ${{ steps.load-secrets.outputs.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://jira.mongodb.org/rest/api/2/project/CLOUDP" \
            | jq '{key, name, projectTypeKey}'
