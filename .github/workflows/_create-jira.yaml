name: Create Jira Ticket (reusable)

on:
  workflow_call:

permissions:
  pull-requests: write
  contents: read

jobs:
  create-jira:
    name: Create Jira ticket
    runs-on: ubuntu-latest
    steps:
      - uses: GitHubSecurityLab/actions-permissions/monitor@v1
        with:
          config: ${{ vars.PERMISSIONS_CONFIG }}
      - uses: 1password/load-secrets-action@v4
        id: load-secrets
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          JIRA_API_TOKEN: "op://APIx/JIRA service account/credential"
          APP_ID: "op://APIx/APIx Github Bot/App ID"
          APP_SECRET: "op://APIx/APIx Github Bot/App Secret"
      - id: decode-app-secret
        run: |
          {
            echo 'APP_PEM<<EOF'
            echo "${{ steps.load-secrets.outputs.APP_SECRET }}" | base64 -d | openssl pkey -inform DER -outform PEM
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - name: Set Apix Bot token
        id: app-token
        uses: mongodb/apix-action/token@8549161120ce38b1e132ff833302a0ecbde58038
        with:
          app-id: ${{ steps.load-secrets.outputs.APP_ID }}
          private-key: ${{ steps.decode-app-secret.outputs.APP_PEM }}
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - name: Determine assignee
        id: author
        run: |
          EMAIL=$(git log -1 --format='%ae' HEAD)
          if [[ "$EMAIL" =~ @mongodb\.com$ ]]; then
            echo "assignee=$EMAIL" >> "$GITHUB_OUTPUT"
          else
            echo "assignee=cloud-atlascli-escalation" >> "$GITHUB_OUTPUT"
          fi
      - name: Determine repo config
        id: config
        run: |
          case "${{ github.repository }}" in
            */mongodb-atlas-local|*/atlas-local-lib|*/atlas-local-cli|*/atlas-local-lib-js)
              echo "component=local-atlas-experience" >> "$GITHUB_OUTPUT"
              echo "fix_version=Not Applicable" >> "$GITHUB_OUTPUT"
              ;;
            */mongodb-atlas-cli)
              echo "component=AtlasCLI" >> "$GITHUB_OUTPUT"
              echo "fix_version=next-atlascli-release" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "component=AtlasCLI" >> "$GITHUB_OUTPUT"
              echo "fix_version=Not Applicable" >> "$GITHUB_OUTPUT"
              ;;
          esac
      - name: Create Jira ticket
        uses: mongodb/apix-action/create-jira@v14
        id: create
        with:
          token: ${{ steps.load-secrets.outputs.JIRA_API_TOKEN }}
          project-key: CLOUDP
          summary: "[${{ github.event.repository.name }}] ${{ github.event.pull_request.title }}"
          issuetype: Story
          description: "This ticket tracks the following GitHub pull request: ${{ github.event.pull_request.html_url }}"
          components: ${{ steps.config.outputs.component }}
          assignee: ${{ steps.author.outputs.assignee }}
          extra-data: |
            {
              "fields": {
                "fixVersions": [{"name": "${{ steps.config.outputs.fix_version }}"}],
                "customfield_12751": [{"id": "22223"}],
                "customfield_10257": {"id": "11861"}
              }
            }
      - name: Add comment
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9
        with:
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            The ticket [${{ steps.create.outputs.issue-key }}](https://jira.mongodb.org/browse/${{ steps.create.outputs.issue-key }}) was created for internal tracking.

            Note: Jira ticket will be closed automatically when this PR is merged.
      - name: Add auto_close_jira label
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr edit "${{ github.event.pull_request.html_url }}" --add-label "auto_close_jira"
      - name: Remove create_jira label
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr edit "${{ github.event.pull_request.html_url }}" --remove-label "create_jira"
