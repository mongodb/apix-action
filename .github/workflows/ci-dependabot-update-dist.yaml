name: Update dist for dependabot prs

on:
  pull_request

jobs:
  update-dist:
    name: Update dist folders
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
    - uses: GitHubSecurityLab/actions-permissions/monitor@v1
      with:
        config: ${{ vars.PERMISSIONS_CONFIG }}
    - uses: 1password/load-secrets-action@v4
      id: load-secrets
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        APP_ID: "op://APIx/APIx Github Bot/App ID"
        APP_SECRET: "op://APIx/APIx Github Bot/App Secret"
    - id: decode-app-secret
      run: |
        {
          echo 'APP_PEM<<EOF'
          echo "${{ steps.load-secrets.outputs.APP_SECRET }}" | base64 -d | openssl pkey -inform DER -outform PEM
          echo EOF
        } >> "$GITHUB_OUTPUT"
    - name: Set Apix Bot token
      id: app-token
      uses: mongodb/apix-action/token@8549161120ce38b1e132ff833302a0ecbde58038
      with:
        app-id: ${{ steps.load-secrets.outputs.APP_ID }}
        private-key: ${{ steps.decode-app-secret.outputs.APP_PEM }}
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        ref: ${{ github.head_ref }}
        token: ${{ steps.app-token.outputs.token }}
        fetch-depth: 0
    - uses: actions/setup-node@v6
      with:
        node-version-file: 'create-jira/package.json'
    - run: |
        cd verify-changed-files
        npm ci
        npm run build
        cd ../create-jira
        npm ci
        npm run build
        cd ../comment-jira
        npm ci
        npm run build
    - name: Commit dist
      run: |
        echo "Changes to dist files:"
        if git diff --exit-code --name-status -- verify-changed-files/dist create-jira/dist comment-jira/dist; then
          echo "No changes to dist folders"
        else 
          git config --global user.name "${{ steps.app-token.outputs.user-name }}"
          git config --global user.email "${{ steps.app-token.outputs.user-email }}"
          git add verify-changed-files/dist create-jira/dist comment-jira/dist
          git commit -m "chore: update dist folders"
          git push origin "${{ github.head_ref }}"
        fi
